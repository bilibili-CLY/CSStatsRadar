<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS2 雷达图工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-logo" aria-hidden="true">
            <span></span>
          </span>
          <h1>CS2 雷达图工作台</h1>
        </div>
        <nav class="view-tabs" aria-label="视图切换">
          <button id="currentDemoTab" class="tab active" type="button">当前 Demo</button>
          <button id="playerRecordsTab" class="tab" type="button">玩家记录</button>
          <button id="showcaseTab" class="tab" type="button">展示轮播</button>
        </nav>
      </header>

      <main id="workspace" class="workspace">
        <aside class="control-rail" aria-label="控制区">
          <section id="demoPanel" class="panel">
            <h2>Demo 文件</h2>
            <label class="file-drop">
              <input id="demoFile" type="file" accept=".dem" />
              <span id="fileName">选择已解压的 .dem 文件</span>
            </label>
            <button id="uploadBtn" class="primary">上传并解析</button>
            <div id="uploadState" class="muted">等待上传本地 Demo。</div>
          </section>

          <section id="playerPanel" class="panel">
            <h2>选择玩家</h2>
            <div id="candidates" class="candidate-list"></div>
          </section>

          <section id="showcasePanel" class="panel" hidden>
            <h2>展示轮播</h2>
            <div id="showcaseQueueList" class="showcase-player-list"></div>
            <div class="showcase-toolbar">
              <button id="resetShowcaseLayoutBtn" type="button">重置布局</button>
            </div>
            <div class="shortcut-hints" aria-label="快捷键提示">
              <span><kbd>Space</kbd> 播放/暂停</span>
              <span><kbd>←</kbd> 上一位</span>
              <span><kbd>→</kbd> 下一位</span>
              <span><kbd>F</kbd> 全屏</span>
              <span><kbd>P</kbd> 粒子</span>
            </div>
          </section>

          <section id="showcaseImagePanel" class="panel" hidden>
            <h2>展示资源</h2>
            <div id="showcaseImagePlayer" class="muted">选择一个玩家后配置图片。</div>
            <label>显示时长（秒）<input id="showcaseDurationSeconds" type="number" min="0.5" step="0.5" value="4" /></label>
            <label>雷达主题色
              <select id="showcaseThemePreset">
                <option value="random">随机颜色</option>
                <option value="default">青色</option>
                <option value="red">红色</option>
                <option value="orange">橙色</option>
                <option value="yellow">黄色</option>
                <option value="green">绿色</option>
                <option value="blue">蓝色</option>
                <option value="indigo">靛蓝</option>
                <option value="violet">紫色</option>
              </select>
            </label>
            <label class="checkbox-row"><input id="showBestMarkers" type="checkbox" checked /> 显示 BEST 标记</label>
            <label class="resource-upload">
              上传图片
              <span class="resource-upload-control">
                <input id="showcaseImageFile" type="file" accept="image/*" />
                <span id="showcaseImageFileName">未选择文件</span>
              </span>
            </label>
            <label>外部图片 URL<input id="showcaseImageUrl" type="url" autocomplete="off" /></label>
            <button id="saveShowcaseImageUrlBtn" type="button">保存外部图片</button>
            <button id="clearShowcaseImageBtn" type="button">清空图片</button>
            <label class="resource-upload">
              MVP 背景图
              <span class="resource-upload-control">
                <input id="showcaseMvpBackgroundFile" type="file" accept="image/*" />
                <span id="showcaseMvpBackgroundFileName">未选择文件</span>
              </span>
            </label>
            <button id="clearShowcaseMvpBackgroundBtn" type="button">清空 MVP 背景</button>
            <label class="resource-upload">
              全局背景音乐
              <span class="resource-upload-control">
                <input id="showcaseMusicFile" type="file" accept="audio/*" />
                <span id="showcaseMusicFileName">未选择文件</span>
              </span>
            </label>
            <button id="clearShowcaseMusicBtn" type="button">清空背景音乐</button>
            <label>ffmpeg 路径<input id="showcaseFFmpegPath" type="text" autocomplete="off" placeholder="/opt/homebrew/bin/ffmpeg" /></label>
            <button id="saveShowcaseSettingsBtn" type="button">保存轮播设置</button>
            <button id="exportShowcaseVideoBtn" type="button" disabled>下载 MP4</button>
            <div id="showcaseVideoStatus" class="muted">配置 ffmpeg 路径后可导出 MP4。</div>
          </section>

          <section id="exportSettingsPanel" class="panel">
            <h2>导出设置</h2>
            <div class="grid2">
              <label>宽度<input id="exportWidth" type="number" min="1" value="1920" /></label>
              <label>高度<input id="exportHeight" type="number" min="1" value="1080" /></label>
            </div>
            <label>雷达标题<input id="radarTitle" type="text" autocomplete="off" /></label>
            <label>日期副标题<input id="radarSubtitle" type="text" autocomplete="off" /></label>
            <label>主题色<input id="themeColor" type="color" value="#00ffff" /></label>
            <label>数据库路径<input id="databasePath" type="text" autocomplete="off" /></label>
            <select id="colorPreset" aria-label="颜色预设">
              <option value="default">默认青色</option>
              <option value="red">红色</option>
              <option value="orange">橙色</option>
              <option value="yellow">黄色</option>
              <option value="green">绿色</option>
              <option value="blue">蓝色</option>
              <option value="indigo">靛蓝</option>
              <option value="violet">紫色</option>
            </select>
            <button id="saveConfigBtn" type="button">保存配置</button>
            <button id="exportBtn" disabled>导出 PNG</button>
          </section>
        </aside>

        <section class="preview-area">
          <canvas id="radarCanvas" width="1280" height="720" aria-label="雷达图预览"></canvas>
          <div id="historyArea" class="history-area" hidden></div>
          <div id="showcaseArea" class="showcase-area" hidden>
            <canvas id="showcaseCanvas" class="showcase-canvas" width="1280" height="720" aria-label="展示轮播预览"></canvas>
            <div id="showcaseTimeline" class="showcase-timeline">
              <div id="showcaseTimelineBar" class="showcase-timeline-bar"></div>
            </div>
            <div id="showcaseAudioTimeline" class="audio-timeline" aria-label="背景音乐波形">
              <canvas id="showcaseWaveformCanvas" width="1280" height="96"></canvas>
              <div id="showcaseAudioPlayhead" class="audio-playhead"></div>
            </div>
            <button id="toggleAudioWaveformBtn" class="audio-toggle" type="button" aria-expanded="true">折叠波形</button>
            <div class="audio-offset-row">
              <span>音乐偏移</span>
              <input id="showcaseAudioOffset" type="range" min="-60" max="60" step="0.1" value="0" />
              <input id="showcaseAudioOffsetSeconds" type="number" min="-60" max="60" step="0.1" value="0" />
              <span>秒</span>
            </div>
          </div>
          <div id="chartTooltip" class="chart-tooltip" hidden></div>
        </section>

        <aside class="metric-rail" aria-label="数据指标">
          <h2 id="metricTitle">数据指标</h2>
          <div id="metricValues" class="metric-list"></div>
          <div id="errorNotice" class="error" hidden></div>
        </aside>
      </main>
    </div>
    <script src="/app.js?v=20260616-particle-fps"></script>
  </body>
</html>
